<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Jam-a-Lot">
  <defs>
    <pattern id="favGrid" width="4" height="4" patternUnits="userSpaceOnUse">
      <path d="M 4 0 L 0 0 0 4" fill="none" stroke="#0f172a" stroke-width="0.5" />
    </pattern>
  </defs>
  <!-- Brand backing + grid (echoes the full logo) -->
  <rect width="32" height="32" rx="7" fill="#070b13" />
  <rect width="32" height="32" rx="7" fill="url(#favGrid)" opacity="0.7" />
  <!-- Icon square -->
  <rect x="6" y="4" width="20" height="20" rx="4" fill="#0b1120" stroke="#1e293b" stroke-width="0.75" />
  <!-- Blue accent mark (the logo's signature accent line, scaled) -->
  <rect x="9" y="27" width="14" height="1.6" rx="0.8" fill="#1e293b" />
  <rect x="9" y="27" width="6" height="1.6" rx="0.8" fill="#3b82f6" />
</svg>
