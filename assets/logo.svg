<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" width="400" height="420" role="img" aria-label="Jam-a-Lot">
  <defs>
    <!-- Background grid decoration -->
    <pattern id="logoGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#0f172a" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Solid layout backing -->
  <rect width="400" height="420" fill="#070b13" rx="16" />
  <rect width="400" height="420" fill="url(#logoGrid)" rx="16" opacity="0.7" />

  <!-- Icon element (brand PNG, rendered into a rounded square) -->
  <g>
    <clipPath id="logoIconClip">
      <rect x="100" y="25" width="200" height="200" rx="20" />
    </clipPath>
    <image href="icon.png" x="100" y="25" width="200" height="200" clip-path="url(#logoIconClip)" preserveAspectRatio="xMidYMid slice" />
    <!-- Inner elegant high contrast border -->
    <rect x="100" y="25" width="200" height="200" rx="20" fill="none" stroke="#1e293b" stroke-width="1.5" />
  </g>

  <!-- Wordmark -->
  <text
    x="200" y="275"
    fill="#f8fafc"
    font-family="'Space Grotesk', 'Inter', sans-serif"
    font-size="44"
    font-weight="700"
    letter-spacing="1"
    text-anchor="middle">Jam-a-Lot</text>

  <!-- Technical accent details -->
  <line x1="80" y1="310" x2="320" y2="310" stroke="#1e293b" stroke-width="2" />
  <line x1="80" y1="310" x2="140" y2="310" stroke="#3b82f6" stroke-width="2.5" />
</svg>
